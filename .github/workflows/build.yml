name: Wails Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            build_flags: "-tags webkit2_41" # 专门给 Linux 续上这个关键参数
          - os: windows-latest
            platform: windows
            build_flags: ""                 # Windows 不需要
          - os: macos-latest
            platform: darwin
            build_flags: ""                 # macOS 不需要

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux Dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev build-essential pkg-config

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails App
        shell: bash
        run: |
          # 动态带入矩阵中定义的 build_flags
          wails build -clean ${{ matrix.build_flags }}

      - name: Package macOS App
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          cd build/bin
          zip -r macos-app.zip *.app
          rm -rf *.app

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wails-artifact-${{ matrix.platform }}
          path: build/bin/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Flatten Artifacts Structure
        run: |
          mkdir ./dist
          find ./artifacts -type f -exec cp {} ./dist/ \;
          echo "=== 待发布文件列表 ==="
          ls -l ./dist

      - name: Create and Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
